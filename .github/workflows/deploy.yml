name: Deploy to Server
on:
  push:
    branches: [ main ]   # 如果你的默认分支不是 main，请改为对应分支名（如 master）
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/my-blog-content
            git pull --ff-only origin main   # 如果分支名不是 main，请同步修改
            cd /root/apps/my-digital-garden/quartz-source
            docker compose exec quartz npx quartz build